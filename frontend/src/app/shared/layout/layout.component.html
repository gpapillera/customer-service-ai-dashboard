<mat-sidenav-container class="shell">
  <mat-sidenav [mode]="isHandset() ? 'over' : 'side'" [opened]="opened()" (openedChange)="onSidenavOpenedChange($event)" class="sidenav" [class.sidenav-overlay]="isHandset()">
    <div class="sidenav-top">
      <div class="brand" [class.brand-collapsed]="!opened()">
        <div class="brand-logo"><cs-icon name="headset"></cs-icon></div>
        <div class="brand-text">
          <span class="brand-name">ServiceAI</span>
          <span class="brand-sub">Case Dashboard</span>
        </div>
        <button
          type="button"
          class="collapse-btn"
          (click)="toggleSidenav()"
          [attr.aria-label]="opened() ? 'Collapse sidebar' : 'Expand sidebar'"
        >
          <cs-icon [name]="opened() ? 'chevron_left' : 'menu'" [size]="20"></cs-icon>
        </button>
        <app-notification-bell></app-notification-bell>
      </div>
      <nav class="nav">
        @for (link of visibleNavLinks; track link.path) {
          <a
            class="nav-item"
            [routerLink]="link.path"
            routerLinkActive="active"
            (click)="isHandset() && toggleSidenav()"
          >
            <cs-icon [name]="link.icon" class="nav-icon"></cs-icon>
            <span class="nav-label">{{ link.label }}</span>
          </a>
        }
      </nav>
    </div>

    @if (user) {
      <div class="sidenav-user">
        <button type="button" class="signout-btn" (click)="logout()">
          <cs-icon name="logout"></cs-icon>
          <span>Sign Out</span>
        </button>
      </div>
    }
  </mat-sidenav>

  <!-- In desktop (side) mode the content shifts only when the sidenav is
       collapsed. In handset (overlay) mode the sidenav floats over the page
       and the thin rail is always present, so the content keeps a constant
       left padding (the rail width) at all times — it never jumps/pushes when
       the wide sidenav opens or closes via the backdrop. -->
  <mat-sidenav-content
    class="content"
    [class.sidebar-closed]="!opened() || isHandset()"
  >
    @if (!opened()) {
      <!-- Collapsed icon rail: keeps the toggle, notifications and primary
           nav one click away when the sidenav is hidden. It appears
           immediately (no waiting for the wide sidenav to finish hiding) and
           slides in via a short transition so the page is never pushed. -->
      <nav class="rail" aria-label="Collapsed navigation">
        <button
          type="button"
          class="rail-toggle"
          (click)="toggleSidenav()"
          [attr.aria-label]="isHandset() ? 'Open sidebar' : 'Expand sidebar'"
        >
          <cs-icon name="menu" [size]="20"></cs-icon>
        </button>

        <div class="rail-bell">
          <app-notification-bell></app-notification-bell>
        </div>

        <div class="rail-nav">
          @for (link of visibleNavLinks; track link.path) {
            <a
              class="rail-item"
              [routerLink]="link.path"
              routerLinkActive="active"
              [attr.aria-label]="link.label"
            >
              <cs-icon [name]="link.icon"></cs-icon>
            </a>
          }
        </div>
      </nav>
    }
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
