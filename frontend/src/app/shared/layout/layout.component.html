<mat-sidenav-container class="shell">
  <mat-sidenav [mode]="isHandset() ? 'over' : 'side'" [opened]="opened()" (openedChange)="onSidenavOpenedChange($event)" class="sidenav">
    <div class="sidenav-top">
      <div class="brand" [class.brand-collapsed]="!opened()">
        <div class="brand-logo"><cs-icon name="headset"></cs-icon></div>
        <div class="brand-text">
          <span class="brand-name">ServiceAI</span>
          <span class="brand-sub">Case Dashboard</span>
        </div>
        <button
          type="button"
          class="collapse-btn"
          (click)="toggleSidenav()"
          [attr.aria-label]="opened() ? 'Collapse sidebar' : 'Expand sidebar'"
        >
          <cs-icon [name]="opened() ? 'chevron_left' : 'menu'" [size]="20"></cs-icon>
        </button>
        <app-notification-bell></app-notification-bell>
      </div>
      <nav class="nav">
        @for (link of navLinks; track link.path) {
          <a
            class="nav-item"
            [routerLink]="link.path"
            routerLinkActive="active"
            (click)="isHandset() && toggleSidenav()"
          >
            <cs-icon [name]="link.icon" class="nav-icon"></cs-icon>
            <span class="nav-label">{{ link.label }}</span>
          </a>
        }
      </nav>
    </div>

    @if (user) {
      <div class="sidenav-user">
        <button type="button" class="signout-btn" (click)="logout()">
          <cs-icon name="logout"></cs-icon>
          <span>Sign Out</span>
        </button>
      </div>
    }
  </mat-sidenav>

  <mat-sidenav-content class="content" [class.sidebar-closed]="!opened()">
    @if (!opened()) {
      <!-- Collapsed icon rail: keeps the toggle, notifications and primary
           nav one click away when the sidenav is hidden. -->
      <nav class="rail" aria-label="Collapsed navigation">
        <button
          type="button"
          class="rail-toggle"
          (click)="toggleSidenav()"
          [attr.aria-label]="isHandset() ? 'Open sidebar' : 'Expand sidebar'"
        >
          <cs-icon name="menu" [size]="20"></cs-icon>
        </button>

        <div class="rail-bell">
          <app-notification-bell></app-notification-bell>
        </div>

        <div class="rail-nav">
          @for (link of navLinks; track link.path) {
            <a
              class="rail-item"
              [routerLink]="link.path"
              routerLinkActive="active"
              [attr.aria-label]="link.label"
            >
              <cs-icon [name]="link.icon"></cs-icon>
            </a>
          }
        </div>
      </nav>
    }
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
